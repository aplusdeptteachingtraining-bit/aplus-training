<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>培訓任務清單 · A Plus 耶加</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="sheets.js"></script>
<style>
:root {
  --green:#1B4332;--green-mid:#2D6A4F;--green-light:#52B788;
  --green-pale:#D8F3DC;--gold:#F6E05E;--cream:#F9F6F0;
  --white:#fff;--text:#1A1A1A;--text-muted:#6B6B6B;--text-light:#9E9E9E;
  --border-light:#E8E8E8;--radius:14px;--radius-sm:8px;--shadow:0 2px 12px rgba(0,0,0,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{overflow-x:hidden;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--text);line-height:1.7;font-size:15px;}

.topbar{background:var(--green);padding:14px 32px;display:flex;align-items:center;gap:12px;}
.topbar a{color:rgba(255,255,255,0.6);text-decoration:none;font-size:13px;}
.topbar a:hover{color:#fff;}
.topbar-sep{color:rgba(255,255,255,0.3);}
.topbar-title{color:#fff;font-size:14px;font-weight:500;}

.page-wrap{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 56px);}

/* SIDEBAR */
.t-sidebar{background:var(--white);border-right:1px solid var(--border-light);padding:24px 16px;position:sticky;top:0;height:calc(100vh - 56px);overflow-y:auto;}
.t-sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-light);margin-bottom:12px;}
.grade-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;border:1px solid var(--border-light);border-radius:var(--radius-sm);font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;background:var(--white);color:var(--text);margin-bottom:6px;transition:all .15s;text-align:left;}
.grade-btn:hover{border-color:var(--green-light);background:var(--green-pale);}
.grade-btn.active{border-color:var(--green-mid);background:var(--green-pale);color:var(--green-mid);font-weight:500;}
.grade-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sidebar-divider{height:1px;background:var(--border-light);margin:20px 0;}
.radar-wrap{padding:8px 0;}
.radar-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-light);margin-bottom:12px;}

/* ── RADAR PANEL (main area) ── */
.radar-panel{background:var(--white);border:1px solid var(--border-light);border-radius:var(--radius);padding:28px;margin-bottom:28px;}
.radar-panel-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.radar-panel-title{font-size:15px;font-weight:500;}
.radar-panel-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.radar-sync-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;border:1px solid rgba(45,106,79,0.3);color:var(--green-mid);background:var(--green-pale);font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;}
.radar-sync-btn:hover{background:var(--green-mid);color:#fff;}
.radar-sync-btn.syncing{opacity:.6;pointer-events:none;}
.radar-layout{display:grid;grid-template-columns:1fr 220px;gap:24px;align-items:center;}
.radar-chart-wrap{position:relative;}
.radar-dim-list{display:flex;flex-direction:column;gap:10px;}
.radar-dim-item{}
.radar-dim-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.radar-dim-name{font-size:13px;font-weight:500;}
.radar-dim-score{font-size:13px;font-weight:600;color:var(--green-mid);}
.radar-dim-bar{height:6px;background:var(--border-light);border-radius:99px;overflow:hidden;}
.radar-dim-fill{height:100%;border-radius:99px;transition:width 1s ease;}
.radar-dim-label{font-size:10px;color:var(--text-light);margin-top:2px;display:flex;justify-content:space-between;}
.radar-legend{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;}
.radar-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);}
.radar-legend-dot{width:10px;height:3px;border-radius:99px;}

/* MAIN */
.t-main{padding:32px 40px 80px;min-width:0;}
.t-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.t-header-left h2{font-size:20px;font-weight:500;margin-bottom:4px;}
.t-header-left p{font-size:13px;color:var(--text-muted);}
.level-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:99px;font-size:12px;font-weight:500;}
.level-badge.entry{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;}
.level-badge.basic{background:#DBEAFE;color:#1E40AF;border:1px solid #93C5FD;}
.level-badge.advanced{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;}

/* PHASE SECTION */
.phase-section{margin-bottom:32px;}
.phase-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.phase-title-row{flex:1;}
.phase-name{font-size:14px;font-weight:500;}
.phase-en{font-size:11px;color:var(--text-muted);}
.phase-count{font-size:12px;color:var(--text-muted);background:var(--cream);padding:2px 10px;border-radius:99px;border:1px solid var(--border-light);}
.phase-bar-mini{height:4px;background:var(--border-light);border-radius:99px;flex:1;max-width:160px;}
.phase-fill-mini{height:100%;border-radius:99px;transition:width .8s ease;}
.phase-fill-mini.e{background:var(--green-mid);}
.phase-fill-mini.b{background:#2563EB;}
.phase-fill-mini.a{background:#C05621;}

/* TASK CARD */
.task-card{background:var(--white);border:1px solid var(--border-light);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:all .15s;}
.task-card.completed{opacity:.65;}
.task-head{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;}
.task-card.completed .task-check{background:var(--green-mid);border-color:var(--green-mid);color:#fff;}
.task-info{flex:1;min-width:0;}
.task-name{font-size:14px;font-weight:500;margin-bottom:2px;}
.task-card.completed .task-name{text-decoration:line-through;color:var(--text-muted);}
.task-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.task-dim{font-size:11px;padding:1px 8px;border-radius:99px;background:var(--cream);border:1px solid var(--border-light);color:var(--text-muted);}
.task-time{font-size:11px;color:var(--text-light);}
.task-weight{font-size:11px;color:#B7791F;background:#FEF9C3;padding:1px 7px;border-radius:99px;border:1px solid #FDE68A;}
.task-expand-btn{color:var(--text-light);font-size:18px;flex-shrink:0;transition:transform .2s;}
.task-card.open .task-expand-btn{transform:rotate(180deg);}
.task-detail{display:none;padding:0 20px 20px;border-top:1px solid var(--border-light);}
.task-card.open .task-detail{display:block;}
.task-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;margin-top:14px;}
.detail-item label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-light);display:block;margin-bottom:3px;}
.detail-item span{font-size:13px;color:var(--text);}

/* NO TASKS */
.no-tasks{padding:40px;text-align:center;color:var(--text-muted);font-size:14px;}

@media(max-width:768px){
  .page-wrap{grid-template-columns:1fr;}
  .t-sidebar{display:none;}
  .t-main{padding:20px 16px 60px;}
  .task-detail-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- EMAIL 登入畫面 -->
<div id="login-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:var(--cream);display:flex;align-items:center;justify-content:center;">
  <div style="background:var(--white);border-radius:var(--radius);padding:36px 32px;width:380px;box-shadow:0 8px 40px rgba(0,0,0,0.12);">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px;">
      <div style="width:10px;height:10px;border-radius:50%;background:#F6E05E;"></div>

        <div style="font-size:15px;font-weight:500;color:#1B4332;">A Plus 耶加</div>
        <div style="font-size:12px;color:var(--text-muted);">培訓任務清單</div>
      </div>
    </div>
    <div style="font-size:18px;font-weight:500;margin-bottom:6px;">請輸入你的 Email</div>

    <input type="email" id="login-email" placeholder="your@email.com"
      style="width:100%;padding:10px 14px;border:1px solid var(--border-light);border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:14px;outline:none;background:var(--cream);margin-bottom:8px;"
      onfocus="this.style.borderColor='#52B788';this.style.background='#fff'"
      onblur="this.style.borderColor='';this.style.background='var(--cream)'"
      onkeydown="if(event.key==='Enter')doEmailLogin()">
    <div id="login-error" style="color:#EF4444;font-size:12px;margin-bottom:12px;display:none;"></div>
    <button onclick="doEmailLogin()" style="width:100%;padding:11px;border:none;border-radius:99px;background:#2D6A4F;color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:500;cursor:pointer;">進入培訓清單</button>
    <div style="margin-top:16px;text-align:center;font-size:12px;color:var(--text-muted);">
      還沒填寫入職問卷？<a href="questionnaire.html" style="color:#2D6A4F;">點此填寫</a>

  </div>
</div>

<div class="topbar">
  <a href="index.html"><i class="ti ti-arrow-left"></i> 返回首頁</a>
  <span class="topbar-sep">›</span>
  <span class="topbar-title">培訓任務清單 Training Tasks</span>
</div>

<div class="page-wrap">

  <!-- SIDEBAR -->
  <aside class="t-sidebar">
    <h3>年級段篩選</h3>
    <button class="grade-btn active" onclick="setGrade('all',this)">
      <span class="grade-dot" style="background:#9CA3AF;"></span>全部顯示
    </button>
    <button class="grade-btn" onclick="setGrade('低年級',this)">
      <span class="grade-dot" style="background:#10B981;"></span>低年級（一、二年級）
    </button>
    <button class="grade-btn" onclick="setGrade('中年級',this)">
      <span class="grade-dot" style="background:#3B82F6;"></span>中年級（三、四年級）
    </button>
    <button class="grade-btn" onclick="setGrade('高年級',this)">
      <span class="grade-dot" style="background:#F59E0B;"></span>高年級（五、六年級）
    </button>
    <button class="grade-btn" onclick="setGrade('跨年級',this)">
      <span class="grade-dot" style="background:#8B5CF6;"></span>跨年級段（全覆蓋）
    </button>

    <div class="sidebar-divider"></div>
    <div class="radar-title">能力概覽</div>
    <div class="radar-wrap">
      <canvas id="miniRadarChart" width="220" height="180"></canvas>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="t-main">
    <div class="t-header">
      <div class="t-header-left">
        <h2>培訓任務清單</h2>
        <p>點擊任務卡可展開詳細資訊，由培訓官評分後自動更新。</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div id="level-badge-wrap"></div>
        <button onclick="manualSyncFromSheets()" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--border-light);border-radius:99px;background:var(--white);cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--text-muted);">
          <i class="ti ti-refresh" id="sync-icon"></i> 同步評分
        </button>
      </div>
    </div>
    <div id="sync-status-bar" style="margin-bottom:12px;font-size:12px;color:var(--text-muted);"></div>

    <!-- RADAR PANEL -->
    <div class="radar-panel">
      <div class="radar-panel-header">
        <div>
          <div class="radar-panel-title">能力雷達圖 Competency Radar</div>
          <div class="radar-panel-sub">分數來源：任務完成自動加分（每完成一項任務即更新）</div>
        </div>
        <button class="radar-sync-btn" id="radar-sync-btn" onclick="syncRadarToSheets()">
          <i class="ti ti-cloud-upload"></i> 同步至 Google Sheets
        </button>
      </div>
      <div class="radar-layout">
        <div class="radar-chart-wrap">
          <canvas id="radarChart" width="340" height="300"></canvas>
          <div class="radar-legend" id="radar-legend"></div>
        </div>
        <div class="radar-dim-list" id="radar-dim-list"></div>
      </div>
    </div>
    <div id="tasks-container"></div>
  </main>
</div>

const PHASE_INFO = {
  entry: { name:'入門階段', en:'Entry Phase', color:'e', badge:'entry' },
  basic: { name:'初階階段', en:'Basic Phase', color:'b', badge:'basic' },
  advanced: { name:'進階階段', en:'Advanced Phase', color:'a', badge:'advanced' },
};

let currentGrade = 'all';
let taskState = {};
let taskScores = {};

function loadState() {
  try { taskState = JSON.parse(localStorage.getItem('tasks')||'{}'); } catch(e){}
  try { taskScores = JSON.parse(localStorage.getItem('scores')||'{}'); } catch(e){}
}
function saveState() {
  localStorage.setItem('tasks', JSON.stringify(taskState));
  localStorage.setItem('scores', JSON.stringify(taskScores));
}

function isVisible(task) {
  if (currentGrade === 'all') return true;
  if (currentGrade === '跨年級') return true;
  return task.grades.includes('通用') || task.grades.includes(currentGrade);
}

function renderTasks() {
  const container = document.getElementById('tasks-container');
  const phases = ['entry','basic','advanced'];
  let html = '';

  phases.forEach(phase => {
    const phaseTasks = TASKS.filter(t => t.phase === phase && isVisible(t));
    if (!phaseTasks.length) return;
    const info = PHASE_INFO[phase];
    const done = phaseTasks.filter(t => taskState[t.id]).length;
    const pct = Math.round(done / phaseTasks.length * 100);

    html += `
      <div class="phase-section" id="${phase}">
        <div class="phase-header">
          <div class="phase-title-row">
            <div class="phase-name">${info.name} <span style="font-size:12px;color:var(--text-muted);font-weight:400;">${info.en}</span></div>
          </div>
          <div class="phase-bar-mini"><div class="phase-fill-mini ${info.color}" style="width:${pct}%"></div></div>
          <div class="phase-count">${done} / ${phaseTasks.length} 完成</div>
        </div>`;

    phaseTasks.forEach(t => {
      const done = !!taskState[t.id];
      const score = taskScores[t.id] || '';
      html += `
        <div class="task-card ${done?'completed':''}" id="card-${t.id}">
          <div class="task-head" onclick="toggleCard('${t.id}')">
            <div class="task-check" style="cursor:default;${done?'background:var(--green-mid);border-color:var(--green-mid);color:#fff;':'opacity:0.4;'}">
              ${done ? '<i class="ti ti-check" style="font-size:12px;"></i>' : ''}
            </div>
            <div class="task-info">
              <div class="task-name">${t.name}</div>
              <div class="task-meta">
                <span class="task-dim">${t.dim}</span>
                <span class="task-time">${t.time}</span>
                ${t.weight > 1 ? `<span class="task-weight">×${t.weight} 高權重</span>` : ''}
                ${t.grades.filter(g=>g!=='通用').map(g=>`<span class="task-dim" style="background:#EDE9FE;color:#5B21B6;border-color:#C4B5FD;">${g}</span>`).join('')}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              ${score ? `<span style="font-size:13px;font-weight:600;color:var(--green-mid);">${score} 分</span>` : ''}
              <span style="font-size:11px;color:var(--text-light);background:var(--cream);border:1px solid var(--border-light);border-radius:99px;padding:2px 8px;white-space:nowrap;">培訓官評分</span>
              <i class="ti ti-chevron-down task-expand-btn"></i>
            </div>
          </div>
          <div class="task-detail">
            <div class="task-detail-grid">
              <div class="detail-item"><label>文件來源</label><span>${t.doc||'—'}</span></div>
              <div class="detail-item"><label>考核方式</label><span>${t.assess}</span></div>
              <div class="detail-item"><label>培訓重點</label><span>${t.detail}</span></div>
              <div class="detail-item"><label>建議時程</label><span>${t.time}</span></div>
            </div>
            <div style="padding:10px 14px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;font-size:12px;color:#065F46;display:flex;align-items:center;gap:8px;">
              <i class="ti ti-lock" style="font-size:14px;"></i>
              此任務由培訓官在後台評分，完成後狀態會自動更新。
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html || '<div class="no-tasks"><i class="ti ti-inbox" style="font-size:32px;margin-bottom:8px;"></i><br>此年級段無對應任務</div>';
}

function toggleCard(id) {
  const card = document.getElementById('card-'+id);
  card.classList.toggle('open');
}

function toggleDone(id) {
  taskState[id] = !taskState[id];
  saveState();
  renderTasks();
  renderRadar();
}

function saveScore(id, val) {
  taskScores[id] = parseInt(val) || 0;
  saveState();
}

function setGrade(grade, btn) {
  currentGrade = grade;
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

// ── RADAR ──
const DIM_COLORS = {
  '教學技巧': '#2D6A4F',
  '學科知識': '#2563EB',
  '課堂管理': '#C05621',
  '行政了解': '#6D28D9',
  '備課能力': '#0D9488',
};
const DIM_EN = {
  '教學技巧': 'Teaching Skills',
  '學科知識': 'Subject Knowledge',
  '課堂管理': 'Classroom Mgmt',
  '行政了解': 'Administration',
  '備課能力': 'Lesson Prep',
};
const DIMS = ['教學技巧','學科知識','課堂管理','行政了解','備課能力'];

function calcRadarScores() {
  const scores = {};
  // 先讀問卷自評結果（C 區塊）
  try { Object.assign(scores, JSON.parse(localStorage.getItem('radarScores')||'{}')); } catch(e){}
  // 沒有問卷資料時從 0 開始，不給預設分
  DIMS.forEach(d => { if (scores[d] === undefined) scores[d] = 0; });
  // 每完成一個任務，對應維度加分（weight × 6，上限100）
  TASKS.filter(t => taskState[t.id]).forEach(t => {
    scores[t.dim] = Math.min(100, (scores[t.dim] || 0) + Math.round(t.weight * 6));
  });
  return scores;
}

function calcHistoryScores() {
  try {
    const saved = JSON.parse(localStorage.getItem('radarHistory')||'null');
    if (saved) return saved;
  } catch(e){}
  const base = {};
  try { Object.assign(base, JSON.parse(localStorage.getItem('radarScores')||'{}')); } catch(e){}
  DIMS.forEach(d => { if (base[d] === undefined) base[d] = 0; });
  return base;
}

let radarChart;
function renderRadar() {
  const scores = calcRadarScores();
  const history = calcHistoryScores();
  const current = DIMS.map(d => scores[d] ?? 0);
  const prev    = DIMS.map(d => history[d] ?? 0);

  // Save history snapshot if not yet
  if (!localStorage.getItem('radarHistory')) {
    localStorage.setItem('radarHistory', JSON.stringify(scores));
  }

  // Chart
  if (radarChart) radarChart.destroy();
  const ctx = document.getElementById('radarChart').getContext('2d');
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: DIMS.map(d => [d, DIM_EN[d]]),
      datasets: [
        {
          label: '目前分數',
          data: current,
          backgroundColor: 'rgba(45,106,79,0.18)',
          borderColor: '#2D6A4F',
          borderWidth: 2,
          pointBackgroundColor: DIMS.map(d => DIM_COLORS[d]),
          pointRadius: 5,
          pointHoverRadius: 7,
        },
        {
          label: '初始分數',
          data: prev,
          backgroundColor: 'rgba(0,0,0,0)',
          borderColor: 'rgba(150,150,150,0.4)',
          borderWidth: 1.5,
          borderDash: [4,4],
          pointRadius: 3,
          pointBackgroundColor: 'rgba(150,150,150,0.5)',
        }
      ]
    },
    options: {
      animation: { duration: 800, easing: 'easeInOutQuart' },
      scales: {
        r: {
          min: 0, max: 100,
          ticks: { stepSize: 20, font: { size: 9 }, color: '#9E9E9E', backdropColor: 'transparent' },
          grid: { color: 'rgba(0,0,0,0.07)' },
          angleLines: { color: 'rgba(0,0,0,0.08)' },
          pointLabels: { font: { size: 10, family: "'Noto Sans TC', sans-serif" }, color: '#1A1A1A' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}：${ctx.raw} 分`
          }
        }
      }
    }
  });

  // Legend
  document.getElementById('radar-legend').innerHTML = `
    <div class="radar-legend-item"><div class="radar-legend-dot" style="background:#2D6A4F;"></div>目前分數</div>
    <div class="radar-legend-item"><div class="radar-legend-dot" style="background:rgba(150,150,150,0.5);border:1px dashed #999;height:0;width:16px;"></div>初始分數</div>
  `;

  // Dim bars
  const avg = Math.round(current.reduce((a,b)=>a+b,0) / current.length);
  document.getElementById('radar-dim-list').innerHTML = DIMS.map((d,i) => {
    const score = current[i];
    const prevScore = prev[i];
    const diff = score - prevScore;
    const diffTxt = diff > 0 ? `<span style="color:#10B981;">+${diff}</span>` : diff < 0 ? `<span style="color:#EF4444;">${diff}</span>` : '—';
    const threshold = d === '課堂管理' ? 65 : d === '行政了解' ? 60 : 50;
    const warn = score < threshold;
    return `<div class="radar-dim-item">
      <div class="radar-dim-head">
        <span class="radar-dim-name" style="color:${DIM_COLORS[d]};">${d}</span>
        <span class="radar-dim-score">${score}</span>
      </div>
      <div class="radar-dim-bar">
        <div class="radar-dim-fill" style="width:${score}%;background:${warn?'#F97316':DIM_COLORS[d]};"></div>
      </div>
      <div class="radar-dim-label">
        <span style="color:${warn?'#C05621':'var(--text-light)'};">${warn?'⚠ 低於達標線':'達標線 '+threshold}</span>
        <span>${diffTxt}</span>
      </div>
    </div>`;
  }).join('') + `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light);display:flex;justify-content:space-between;font-size:12px;"><span style="color:var(--text-muted);">雷達圖加權平均</span><strong style="color:var(--green-mid);">${avg} 分</strong></div>`;

  // Sync sidebar mini radar
  renderMiniRadar(current);
}

let miniRadar;
function renderMiniRadar(current) {
  const canvas = document.getElementById('miniRadarChart');
  if (!canvas) return;
  if (miniRadar) miniRadar.destroy();
  miniRadar = new Chart(canvas.getContext('2d'), {
    type: 'radar',
    data: {
      labels: DIMS,
      datasets: [{ data: current, backgroundColor:'rgba(45,106,79,0.2)', borderColor:'#2D6A4F', borderWidth:1.5, pointRadius:2 }]
    },
    options: {
      scales: { r:{ min:0,max:100, ticks:{display:false}, grid:{color:'rgba(0,0,0,0.06)'}, angleLines:{color:'rgba(0,0,0,0.06)'}, pointLabels:{font:{size:8}} } },
      plugins: { legend:{display:false} },
      animation: false,
    }
  });
}

// ── SYNC TO SHEETS ──
async function syncRadarToSheets() {
  const btn = document.getElementById('radar-sync-btn');
  btn.classList.add('syncing');
  btn.innerHTML = '<i class="ti ti-loader-2"></i> 同步中...';
  try {
    const profile = JSON.parse(localStorage.getItem('profile')||'{}');
    const scores = calcRadarScores();
    const tasks = taskState;
    await submitProgress({ name: profile.name||'未知', grade: profile.grade||'', radarScores: scores, tasks });
    btn.innerHTML = '<i class="ti ti-check"></i> 已同步';
    btn.style.background = '#D1FAE5'; btn.style.color = '#065F46';
    setTimeout(() => {
      btn.innerHTML = '<i class="ti ti-cloud-upload"></i> 同步至 Google Sheets';
      btn.style.background = ''; btn.style.color = '';
      btn.classList.remove('syncing');
    }, 2500);
  } catch(e) {
    btn.innerHTML = '<i class="ti ti-alert-circle"></i> 同步失敗（離線儲存）';
    btn.style.color = '#C05621';
    setTimeout(() => {
      btn.innerHTML = '<i class="ti ti-cloud-upload"></i> 同步至 Google Sheets';
      btn.style.color = ''; btn.classList.remove('syncing');
    }, 2500);
  }
}

// ── LEVEL BADGE ──
function renderLevelBadge() {
  try {
    const r = JSON.parse(localStorage.getItem('qResult')||'{}');
    if (!r.level) return;
    const cls = r.level.includes('進階') ? 'advanced' : r.level.includes('初階') ? 'basic' : 'entry';
    document.getElementById('level-badge-wrap').innerHTML =
      `<span class="level-badge ${cls}"><i class="ti ti-award"></i> ${r.level}</span>`;

function resetSheetsUrl() {
  localStorage.removeItem('sheetsUrl');
  document.getElementById('sheets-setup-banner').style.display = 'block';
  document.getElementById('sync-status-bar').textContent = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function saveTeacherSheetsUrl() {
  const val = document.getElementById('teacher-sheets-url').value.trim();
  if (!val.includes('script.google.com')) {
    alert('請貼入正確的 Apps Script URL');
    return;
  }

async function manualSyncFromSheets() {
  const icon = document.getElementById('sync-icon');
  const bar  = document.getElementById('sync-status-bar');
  if (icon) icon.style.animation = 'spin 1s linear infinite';
  if (bar)  bar.textContent = '同步中...';

  await loadStateFromSheets();

  if (icon) icon.style.animation = '';
  if (bar) {
    const url = localStorage.getItem('sheetsUrl') || '';
    bar.textContent = url ? '✓ 已從培訓官後台同步最新評分（' + new Date().toLocaleTimeString('zh-TW') + '）' : '⚠ 尚未設定 Sheets URL';
    bar.style.color = url ? '#10B981' : '#F59E0B';
  }
}

// ── Google Sheets URL（內建）──
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwZaAsaIAgc-RrnT-z_r1YQDHEVQnSLieL5KAzjFEm50316BF_4K0x5jzkkofFwMf4v/exec';
localStorage.setItem('sheetsUrl', SHEETS_URL);

// ── EMAIL 登入 ──
async function doEmailLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!email || !email.includes('@')) {
    errEl.textContent = '請輸入有效的 Email';
    errEl.style.display = 'block';
    return;
  }

  // 從 Sheets 驗證 email 是否存在
  try {
    const res = await fetch(SHEETS_URL + '?sheet=Questionnaire&t=' + Date.now());
    const rows = await res.json();
    const found = rows.find(r => (r['Email'] || r.email || '').toLowerCase() === email);
    if (!found) {
      errEl.textContent = '找不到此 Email，請確認填寫問卷時使用的地址';
      errEl.style.display = 'block';
      return;
    }
    // 登入成功，存入 localStorage
    const profile = {
      name:  found['姓名']   || found.name  || '',
      grade: found['年級段'] || found.grade || '',
      email: email,
    };
    localStorage.setItem('profile', JSON.stringify(profile));
    localStorage.setItem('userEmail', email);
    document.getElementById('login-overlay').style.display = 'none';
    initTaskPage();
  } catch(e) {
    errEl.textContent = '驗證失敗，請稍後再試';
    errEl.style.display = 'block';
  }
}

function checkLogin() {
  const email = localStorage.getItem('userEmail') || '';
  if (!email) {
    document.getElementById('login-overlay').style.display = 'flex';
  } else {
    document.getElementById('login-overlay').style.display = 'none';
    initTaskPage();
  }
}

function initTaskPage() {
  taskState = {};
  taskScores = {};
  renderTasks();
  renderRadar();
  renderLevelBadge();
  loadStateFromSheets();
}

checkLogin();

// 加入 spin 動畫 CSS
const spinStyle = document.createElement('style');
spinStyle.textContent = '@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }';
document.head.appendChild(spinStyle);

// ── 從 Google Sheets 讀取培訓官評分結果（Sheets 優先，完全覆蓋本機）──
async function loadStateFromSheets() {
  try {
    const profile = JSON.parse(localStorage.getItem('profile') || '{}');
    const myName = profile.name || '';
    if (!myName) return;

    const sheetsUrl = localStorage.getItem('sheetsUrl') || '';
    if (!sheetsUrl) {
      loadStateFromAdmin();
      renderTasks();
      renderRadar();
      return;
    }

    const res = await fetch(sheetsUrl + '?sheet=Teachers&t=' + Date.now());
    if (!res.ok) return;
    const rows = await res.json();
    if (!Array.isArray(rows)) return;

    const myEmail = localStorage.getItem('userEmail') || '';
    const mine = rows.find(r =>
      (r['Email'] || r.email || '').toLowerCase() === myEmail ||
      (r['姓名'] || r.name || '') === myName
    );
    if (!mine) return;

    // 完全清空本機任務狀態，以 Sheets 為準
    taskState = {};
    taskScores = {};

    const taskJson = mine['任務狀態'] || mine.tasks || '';
    if (taskJson && taskJson.length > 2) {
      try {
        const taskData = typeof taskJson === 'string' ? JSON.parse(taskJson) : taskJson;
        Object.keys(taskData).forEach(id => {
          if (taskData[id] && typeof taskData[id] === 'object') {
            taskState[id]  = !!taskData[id].done;
            taskScores[id] = String(taskData[id].score || '');
          }
        });
      } catch(e) { console.warn('任務狀態 JSON 解析失敗', e.message); }
    }

    saveState();
    renderTasks();
    renderRadar();

  } catch(e) {
    // 讀取失敗，保留本機資料不動
    console.warn('Sheets 讀取失敗，使用本機資料', e.message);
  }
}

function loadStateFromAdmin() {
  try {
    const profile = JSON.parse(localStorage.getItem('profile') || '{}');
    const name = profile.name || '';
    const adminScoring = JSON.parse(localStorage.getItem('adminScoring') || '{}');
    if (name && adminScoring[name]) {
      const s = adminScoring[name];
      taskState = {};
      taskScores = {};
      Object.keys(s).forEach(id => {
        taskState[id]  = !!s[id].done;
        taskScores[id] = s[id].score || '';
      });
    }
  } catch(e) {}
}

checkLogin();

}
